services:
  backend:
    build: ./backend
    container_name: support-bot-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MLFLOW_TRACKING_URI=sqlite:////app/mlflow_data/mlflow.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_data:/app/chroma_db
      - mlflow_data:/app/mlflow_data

  frontend:
    build: ./frontend
    container_name: support-bot-frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "7860:7860"
    depends_on:
      - backend

volumes:
  chroma_data:
  mlflow_data: 